<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#2D5BA0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Set Tracker">
<meta name="mobile-web-app-capable" content="yes">
<title>Set Tracker — Production Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#ECEEF1; --surface:#FFFFFF; --surface-2:#F5F7F9;
    --ink:#1B1F24; --muted:#6B7480; --faint:#A2AAB3;
    --line:#DCE1E6; --line-soft:#EAEEF1;
    --accent:#2D5BA0; --accent-ink:#1E3F73;
    --good:#1E8A55; --bad:#CF3B33; --warn:#C07A12; --done:#5B6470; --pri:#2563EB;
    --radius:16px;
    --mono:'Space Mono', ui-monospace, monospace;
    --disp:'Space Grotesk', system-ui, sans-serif;
    --body:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--canvas);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:88px}
  .wrap{max-width:960px;margin:0 auto;padding:0 13px}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}

  header.app{position:sticky;top:0;z-index:30;background:rgba(236,238,241,.88);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
  .head-inner{display:flex;align-items:center;gap:11px;padding:12px 0}
  .logo-mark{width:25px;height:25px;border-radius:7px;flex:none;background:linear-gradient(150deg,var(--accent),var(--accent-ink));display:grid;place-items:center;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700}
  .brand h1{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.02em;margin:0}
  .brand .tag{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
  .head-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .sync{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 10px;cursor:pointer;white-space:nowrap}
  .sync .sd{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .sync.synced .sd{background:var(--good)} .sync.synced{color:var(--good)}
  .sync.offline .sd{background:var(--warn)} .sync.offline{color:var(--warn)}
  .sync.error .sd{background:var(--bad)} .sync.error{color:var(--bad)}
  .sync.connecting .sd{background:var(--accent);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:560px){ .sync .lab{display:none} .sync{padding:6px} }
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:10px;font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:transform .06s,background .15s,border-color .15s;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-ink)}
  .btn.icon{padding:9px 11px}
  .btn svg{width:16px;height:16px}

  .controls{display:flex;align-items:center;gap:10px;padding:13px 0 4px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;max-width:100%;overflow-x:auto}
  .seg button{flex:none;padding:7px 14px;border-radius:8px;font-weight:600;font-size:13.5px;color:var(--muted);transition:all .14s;white-space:nowrap}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .spacer{flex:1}
  .window-ctl{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 9px}
  .window-ctl input{width:42px;border:1px solid var(--line);border-radius:7px;padding:4px 5px;font-family:var(--mono);font-size:13px;text-align:center;color:var(--ink)}

  .summary{display:flex;align-items:center;gap:3px;flex-wrap:wrap;padding:11px 2px 4px;font-size:13px;color:var(--muted)}
  .summary .fbtn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-weight:600;color:var(--muted);transition:all .12s}
  .summary .fbtn .dot{width:8px;height:8px;border-radius:50%}
  .summary .fbtn b{font-family:var(--mono);color:var(--ink)}
  .summary .fbtn.on{background:var(--surface);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink)}
  .summary .sep{color:var(--faint);padding:0 2px}
  .dot.tight{background:var(--good)} .dot.spread{background:var(--bad)} .dot.incomplete{background:var(--warn)} .dot.done{background:var(--done)}

  .search{position:relative;margin:6px 0 2px}
  .search input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:14px;font-family:var(--body);color:var(--ink)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--faint)}

  .board{padding:14px 0 24px}
  .col-head{display:grid;gap:9px;padding:0 14px 8px}
  .col-head span{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .group{margin-bottom:18px}
  .group-title{display:flex;align-items:baseline;gap:9px;margin:0 4px 8px}
  .group-title .nm{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:-.01em;display:inline-flex;align-items:center;gap:8px}
  .group-title .nm::before{content:"";width:9px;height:9px;border-radius:3px;background:var(--accent)}
  .group-title .ct{font-family:var(--mono);font-size:11.5px;color:var(--faint)}

  .sheet{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .row{display:grid;gap:9px;align-items:center;padding:12px 14px;cursor:pointer;transition:background .12s;border-top:1px solid var(--line-soft)}
  .sheet .row:first-child{border-top:none}
  .row:hover{background:var(--surface-2)}
  .row:active{background:var(--line-soft)}
  .row.is-done{opacity:.6}
  .row .st{width:11px;height:11px;border-radius:50%;justify-self:start}
  .row .st.tight{background:var(--good)} .row .st.spread{background:var(--bad)} .row .st.incomplete{background:var(--warn)}
  .row .st.done{background:none;width:auto;color:var(--good);font-family:var(--mono);font-weight:700;font-size:12px;line-height:1}
  .row .pn{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:-.02em}
  .row .d{font-family:var(--mono);font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-flex;align-items:center;gap:3px}
  .row .d.late{color:var(--bad);font-weight:700}
  .row .d.empty{color:var(--faint)}
  .row .d.dn{color:var(--done)}
  .row .d.pred{color:#8A7CC0;font-style:italic}
  .row .d .ck{color:var(--good);font-weight:700}
  .row .d .more{color:var(--faint);font-size:11px}
  .row .d.pri{color:var(--pri);font-weight:700}
  .row .pn.pri{color:var(--pri)}
  .pstar{color:var(--pri);font-size:10px;margin-right:2px}
  .pri-toggle{width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);background:var(--surface);color:var(--faint);display:grid;place-items:center;font-size:15px;flex:none}
  .pri-toggle.on{background:var(--pri);border-color:var(--pri);color:#fff}
  .d-pn.pri{color:var(--pri)}
  .pri-btn{width:100%;justify-content:center;padding:11px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--muted);font-weight:600;font-size:14px;margin-bottom:15px;display:inline-flex;align-items:center;gap:7px}
  .pri-btn.on{background:rgba(37,99,235,.1);border-color:var(--pri);color:var(--pri)}
  .sched{margin-top:16px;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:12px;padding:13px 14px}
  .sched-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .sched-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;align-items:baseline}
  .sched-grid .sk{font-size:12.5px;color:var(--muted)}
  .sched-grid .sv{font-family:var(--mono);font-size:13.5px;font-weight:700;text-align:right}
  .sched-grid .sv.hl{color:var(--accent)}
  .sched-grid .sv.late{color:var(--bad)}
  .sfaint{color:var(--faint);font-family:var(--body);font-weight:400;font-size:12px}
  .sched-foot{margin-top:11px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--faint);font-family:var(--mono);line-height:1.5}
  .dl-chip{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:none;letter-spacing:0}
  .dl-chip.r{background:rgba(207,59,51,.12);color:var(--bad)} .dl-chip.g{background:rgba(30,138,85,.12);color:var(--good)} .dl-chip.w{background:rgba(192,122,18,.13);color:var(--warn)}
  .row .dl{font-family:var(--mono);font-size:13px;text-align:right;white-space:nowrap}
  .row .dl.r{color:var(--bad);font-weight:700} .row .dl.g{color:var(--good)} .row .dl.w{color:var(--warn)} .row .dl.n{color:var(--faint)}

  .empty-state{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty-state svg{width:42px;height:42px;color:var(--faint);margin-bottom:12px}
  .empty-state h3{font-family:var(--disp);font-weight:600;color:var(--ink);margin:0 0 6px;font-size:18px}
  .empty-state p{margin:0 0 16px;font-size:14px}

  .scrim{position:fixed;inset:0;background:rgba(27,31,36,.42);backdrop-filter:blur(2px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .scrim.show{display:flex}
  .modal{background:var(--surface);width:100%;max-width:500px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.25);animation:slideup .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes slideup{from{transform:translateY(28px);opacity:.6}to{transform:translateY(0);opacity:1}}
  @media(min-width:600px){.scrim{align-items:center}.modal{border-radius:20px}}
  .modal-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;padding:17px 20px 14px;border-bottom:1px solid var(--line-soft);z-index:2}
  .modal-head h2{font-family:var(--disp);font-weight:600;font-size:18px;margin:0;letter-spacing:-.01em}
  .modal-head .x{margin-left:auto;width:33px;height:33px;border-radius:9px;display:grid;place-items:center;background:var(--surface-2);color:var(--muted)}
  .mbody{padding:18px 20px 22px}
  .mbody.hide{display:none}

  .d-top{display:flex;align-items:center;gap:11px;margin-bottom:14px;flex-wrap:wrap}
  .d-pn{font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:-.03em}
  .d-cat{font-size:13px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  .badge{margin-left:auto;font-size:12px;font-weight:700;font-family:var(--mono);padding:5px 11px;border-radius:999px}
  .badge.g{background:rgba(30,138,85,.12);color:var(--good)}
  .badge.r{background:rgba(207,59,51,.12);color:var(--bad)}
  .badge.w{background:rgba(192,122,18,.13);color:var(--warn)}
  .badge.k{background:rgba(91,100,112,.14);color:var(--done)}
  .meter{position:relative;height:18px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line-soft);overflow:hidden;margin:6px 0 6px}
  .meter .zone{position:absolute;left:0;top:0;bottom:0;background:rgba(30,138,85,.14)}
  .meter .tick{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .meter .tick.g{background:var(--good)} .meter .tick.r{background:var(--bad)}
  .meter-cap{font-size:11px;color:var(--faint);margin:0 0 14px;text-align:right;font-family:var(--mono)}

  .d-comp{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line-soft)}
  .d-comp .lab{flex:1;min-width:0;font-size:13px;color:var(--ink);font-weight:500}
  .d-comp .lab em{color:var(--faint);font-style:normal;font-size:11px;font-weight:400}
  .d-comp .val{font-family:var(--mono);font-weight:700;font-size:14px;white-space:nowrap}
  .d-comp .val.late{color:var(--bad)} .d-comp .val.empty{color:var(--faint);font-weight:400}
  .d-comp .val.dn{color:var(--done)}
  .d-comp .val.pred{color:#8A7CC0;font-style:italic;font-weight:600}
  .d-comp .gap{font-family:var(--mono);font-size:11px;color:var(--faint);width:54px;text-align:right}
  .d-comp .gap.late{color:var(--bad);font-weight:700}
  .ck-btn{flex:none;width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line);background:var(--surface);color:var(--faint);display:grid;place-items:center;font-weight:700;font-size:15px;transition:all .12s}
  .ck-btn.on{background:var(--good);border-color:var(--good);color:#fff}
  .d-note{margin-top:14px;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink)}
  .d-note .nl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:3px}

  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .field input, .field select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:15px;font-family:var(--body);color:var(--ink)}
  .field input[type=date]{font-family:var(--mono);font-size:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .pf-row{display:flex;align-items:center;gap:10px}
  .pf-row:first-child{border-top:none}
  .pf-lab{width:108px;flex:none;font-size:13px;font-weight:500}
  .pf-lab em{color:var(--faint);font-style:normal;font-size:11px}
  .pf-row input[type=date]{flex:1;padding:9px 10px;border-radius:9px;border:1px solid var(--line);font-family:var(--mono);font-size:13px;color:var(--ink);background:var(--surface)}
  .pf-head{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin:4px 0 2px}

  .mfoot{display:flex;gap:10px;padding-top:8px;border-top:1px solid var(--line-soft);margin-top:14px}
  .mfoot .btn{flex:1;justify-content:center;padding:12px}
  .btn.danger{color:var(--bad);border-color:rgba(207,59,51,.3);background:rgba(207,59,51,.07)}
  .btn.ghost{background:var(--surface-2)}

  /* category manager */
  .cat-card{border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:13px;background:var(--surface)}
  .cat-card .cc-top{display:flex;gap:9px;align-items:center;margin-bottom:9px}
  .cat-card .cc-top input{flex:1;font-weight:600;font-family:var(--disp);font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;color:var(--ink)}
  .cat-card .del{width:32px;height:32px;border-radius:9px;flex:none;background:rgba(207,59,51,.07);color:var(--bad);display:grid;place-items:center}
  .part-line{display:flex;gap:7px;align-items:center;margin-bottom:7px}
  .part-line input.pl-lab{flex:1;min-width:0;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--ink)}
  .part-line select{flex:none;width:96px;padding:8px 6px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;color:var(--ink);background:var(--surface)}
  .part-line .opt{flex:none;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap}
  .part-line .px{width:28px;height:28px;flex:none;border-radius:8px;background:var(--surface-2);color:var(--faint);display:grid;place-items:center}
  .part-line .st-name{flex:1}
  .part-line .st-days{flex:none;width:56px;padding:8px 6px;border:1px solid var(--line);border-radius:8px;font-family:var(--mono);font-size:13px;text-align:center;color:var(--ink)}
  .part-line .st-d{font-size:12px;color:var(--faint);margin:0 2px 0 -3px}
  .cc-stage-h{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;margin:12px 0 8px;padding-top:11px;border-top:1px solid var(--line-soft)}
  .cc-stage-h span{text-transform:none;letter-spacing:0;color:var(--faint);font-weight:400}
  .cc-hint{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:2px 0 7px}
  .part-line .pl-days{flex:none;width:44px;padding:8px 4px;border:1px solid var(--line);border-radius:8px;font-family:var(--mono);font-size:13px;text-align:center;color:var(--ink)}
  .var-area{display:flex;flex-wrap:wrap;gap:8px}
  .vchip{border:1.5px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .vchip .vd{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .vchip.on{background:rgba(45,91,160,.1);border-color:var(--accent);color:var(--accent)}
  .vchip.on .vd{color:var(--accent)}
  .pf-block{padding:10px 0;border-top:1px solid var(--line-soft)}
  .pf-block:first-child{border-top:none}
  .pf-vars{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-left:2px}
  .vchip.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .pl-sub{color:var(--faint);font-size:11px;font-style:normal;line-height:1.5}
  .d-comp .lab{line-height:1.35}
  .addpart{font-size:12.5px;color:var(--accent);font-weight:600;padding:4px 0}

  .menu{position:absolute;right:13px;top:60px;background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:0 8px 30px -10px rgba(0,0,0,.3);padding:6px;z-index:40;display:none;min-width:196px}
  .menu.show{display:block}
  .menu button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:9px;font-size:14px;font-weight:500;color:var(--ink);text-align:left}
  .menu button:hover{background:var(--surface-2)}
  .menu button.warn{color:var(--bad)}
  .menu svg{width:16px;height:16px;color:var(--muted)}
  .menu .sep{height:1px;background:var(--line-soft);margin:5px 6px}

  .fab{position:fixed;right:18px;bottom:22px;z-index:35;width:56px;height:56px;border-radius:18px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:0 8px 24px -6px rgba(45,91,160,.6);border:none}
  .fab svg{width:26px;height:26px}
  @media(min-width:600px){.fab{display:none}}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:60;pointer-events:none;max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  #confirmBody .cmsg{font-size:15.5px;line-height:1.55;color:var(--ink);padding:6px 2px 4px}

  @media(max-width:560px){
    .row{padding:12px 11px;gap:6px}
    .row .pn{font-size:14px}
    .row .d{font-size:12px}
    .col-head{padding:0 11px 7px;gap:6px}
    .head-actions .lbl-hide{display:none}
    .sheet{overflow-x:auto}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="app">
  <div class="wrap head-inner">
    <div class="logo-mark">ST</div>
    <div class="brand"><h1>Set Tracker</h1><div class="tag">Production board</div></div>
    <div class="head-actions">

const Store = (() => {

    set(k,v){ try { if(ok) localStorage.setItem(k,v); else mem[k]=v; } catch(e){ mem[k]=v; } }

const KEY='settracker.v2';
const $=id=>document.getElementById(id);

const ROLES=[{v:'main',t:'Main'},{v:'inner',t:'Inner'},{v:'bottoms',t:'Bottoms'},{v:'extra',t:'Extra'}];
const ROLE_ORDER=['main','inner','bottoms','extra'];

      {key:'p_ts', label:'T-shirt', role:'inner', optional:false, days:2},
      {key:'p_pt', label:'Pant', role:'bottoms', optional:false, days:4},

      {key:'p_pt', label:'Pant', role:'bottoms', optional:false, days:4},
      {key:'p_bow', label:'Bow', role:'extra', optional:true, days:1},

      {key:'p_ts', label:'T-shirt', role:'inner', optional:false, days:2},

function defaultStages(){        // FIXED stages — applied to every design

function defaultVariableStages(){ // library of optional post-processes, chosen per design
  return [
    {id:'vs_wash', name:'Washing', days:7},
    {id:'vs_print', name:'Screen printing', days:6},
    {id:'vs_button', name:'Buttoning', days:2},
  ];
}

let state={ sets:[], categories:[], stages:[], variableStages:[], buffer:3, view:'grouped', filter:'all', search:'', window:7 };
let editingId=null;

/* ============================================================
   FIREBASE — paste your config below to turn on multi-device sync.
   Leave blank to keep the app local-only (saves to this device).

  apiKey: "AIzaSyCbixluS7YL-X-7LXW0ReIw6F0VQ6R4_-w",

  storageBucket: "production-dashboard-f2313.firebasestorage.app",

  appId: "1:30608523876:web:96306448836eaf0a35d571"
};
let cloud={ on:false, db:null, fns:null, knownIds:[], seeded:false };

function load(){
  const raw=Store.get(KEY);
  if(raw){ try{ const d=JSON.parse(raw); state.sets=d.sets||[]; state.categories=(d.categories&&d.categories.length)?d.categories:defaultCategories(); state.stages=(d.stages&&d.stages.length)?d.stages:defaultStages(); state.variableStages=(d.variableStages&&d.variableStages.length)?d.variableStages:defaultVariableStages(); state.buffer=(d.buffer!=null)?d.buffer:3; state.window=d.window||7; state.view=d.view||'grouped'; }catch(e){ state.categories=defaultCategories(); state.stages=defaultStages(); state.variableStages=defaultVariableStages(); state.sets=sampleData(); } }
  else { state.categories=defaultCategories(); state.stages=defaultStages(); state.variableStages=defaultVariableStages(); state.sets=sampleData(); }
}
function save(){ Store.set(KEY, JSON.stringify({sets:state.sets, categories:state.categories, stages:state.stages, variableStages:state.variableStages, buffer:state.buffer, window:state.window, view:state.view})); cloudWriteMeta(); }

function sampleData(){
  const D=(d)=>'2024-10-'+String(d).padStart(2,'0');
  return [
    {id:uid('s'),pattern:'1160',dispatch:D(8),catId:'cat_wc',dates:{p_wc:D(1),p_sh:D(2),p_pt:D(1)},done:['p_wc','p_sh','p_pt'],note:'Lot A · 200 pc'},
    {id:uid('s'),pattern:'1070',dispatch:D(14),catId:'cat_wc',dates:{p_wc:D(2),p_sh:D(2),p_pt:D(8),p_bow:D(3)},done:['p_wc'],note:''},
    {id:uid('s'),pattern:'1228',catId:'cat_wc',dates:{p_wc:D(1),p_sh:D(3),p_pt:D(1)},done:[],note:''},
    {id:uid('s'),pattern:'1213',dispatch:D(13),catId:'cat_wc',dates:{p_wc:D(10),p_pt:D(11)},done:[],note:'shirt not cut'},
    {id:uid('s'),pattern:'1185',dispatch:D(12),catId:'cat_wc',dates:{p_wc:D(1),p_sh:D(11),p_pt:D(10)},done:[],note:'shirt late',priority:true},
    {id:uid('s'),pattern:'1216',catId:'cat_wc',dates:{p_wc:D(11),p_sh:D(11),p_pt:D(11)},done:[],note:''},
    {id:uid('s'),pattern:'1025',catId:'cat_wc',dates:{p_wc:D(9),p_sh:D(4)},done:[],note:'pant pending'},
    {id:uid('s'),pattern:'1234',dispatch:D(10),catId:'cat_wc',dates:{p_wc:D(7),p_sh:D(11),p_pt:D(1)},done:[],note:'',partVars:{p_sh:['vs_print']}},
    {id:uid('s'),pattern:'1208',catId:'cat_wc',dates:{p_wc:D(6),p_sh:D(6),p_pt:D(8),p_bow:D(7)},done:[],note:''},
    {id:uid('s'),pattern:'1190',catId:'cat_bz',dates:{p_bz:D(2),p_ts:D(4),p_pt:D(6),p_sh:D(5)},done:['p_bz','p_ts'],note:''},
    {id:uid('s'),pattern:'1402',catId:'cat_bz',dates:{p_bz:D(5),p_ts:D(9)},done:[],note:'bottoms not started'},
    {id:uid('s'),pattern:'1310',dispatch:D(18),catId:'cat_bz5',dates:{p_bz:D(1),p_sh:D(3),p_pt:D(5),p_bow:D(4),p_wc:D(6)},done:[],note:''},
    {id:uid('s'),pattern:'1501',dispatch:D(20),catId:'cat_jk',dates:{p_jk:D(2),p_ts:D(4),p_pt:D(5)},done:[],note:'',priority:true,partVars:{p_jk:['vs_wash']}},
    {id:uid('s'),pattern:'1620',catId:'cat_sus',dates:{p_sh:D(3),p_pt:D(5),p_sus:D(4)},done:[],note:''},
  ];
}

function parseD(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
function days(a,b){ return Math.round((b-a)/86400000); }
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtShort(s){ const d=parseD(s); return d? d.getDate()+' '+MON[d.getMonth()] : '—'; }
function fmtLong(s){ const d=parseD(s); return d? String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]+' '+String(d.getFullYear()).slice(2) : null; }
function dateStr(d){ return d? d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') : ''; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function getCat(id){ return state.categories.find(c=>c.id===id) || {id:id,name:'(unknown)',parts:[]}; }
function addDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
function fixedTotal(){ return (state.stages||[]).reduce((s,st)=>s+(parseInt(st.days,10)||0),0); }
function partDays(part){ return parseInt(part&&part.days,10)||0; }
function partVarStages(set,partKey){ const ids=((set.partVars||{})[partKey])||[]; return (state.variableStages||[]).filter(v=>ids.includes(v.id)); }
function partVarDays(set,partKey){ return partVarStages(set,partKey).reduce((s,v)=>s+(parseInt(v.days,10)||0),0); }
function partLead(set,part){ return partDays(part)+partVarDays(set,part.key); }  // make-time + this piece's own processes
function schedule(set){
  const cat=getCat(set.catId);
  const parts=cat.parts||[];
  const fixed=fixedTotal();
  const leads={}; let maxLead=0;
  parts.forEach(p=>{ const L=partLead(set,p); leads[p.key]=L; if(L>maxLead) maxLead=L; });
  const lead=maxLead+fixed;
  const buffer=parseInt(state.buffer,10)||0;
  const disp=parseD(set.dispatch);
  let expectedReady=null, startBy=null, compDeadline=null;
  const partStartBy={};
  if(disp){
    expectedReady=addDays(disp,-buffer);              // whole design ready this many days before dispatch
    compDeadline=addDays(expectedReady,-fixed);       // all components (incl. their processes) done by here
    startBy=addDays(compDeadline,-maxLead);           // begin the whole design by here
    parts.forEach(p=>{ partStartBy[p.key]=addDays(compDeadline,-leads[p.key]); });
  }
  const req=parts.filter(p=>!p.optional);
  const allReq = req.length>0 && req.every(p=>parseD((set.dates||{})[p.key]));
  let actualReady=null;
  if(allReq){ actualReady=req.reduce((mx,p)=>{ const d=parseD(set.dates[p.key]); return (!mx||d>mx)?d:mx; }, null); }
  let delay=null;
  if(expectedReady && actualReady) delay=days(expectedReady, actualReady); // + = late
  return {cat,parts,leads,maxLead,fixed,lead,buffer,disp,expectedReady,compDeadline,startBy,partStartBy,actualReady,delay,allReq};
}

function analyze(set){
  const cat=getCat(set.catId);
  const parts=cat.parts||[];
  const win=state.window;
  const dates=set.dates||{};
  const done=set.done||[];
  const filled=parts.map(p=>({p,d:parseD(dates[p.key])})).filter(o=>o.d);
  const reqParts=parts.filter(p=>!p.optional);
  const requiredMissing=reqParts.some(p=>!parseD(dates[p.key]));
  let earliest=null,latest=null;
  filled.forEach(o=>{ if(!earliest||o.d<earliest)earliest=o.d; if(!latest||o.d>latest)latest=o.d; });
  const spread=(earliest&&latest)?days(earliest,latest):0;
  const cells={};
  parts.forEach(p=>{ const d=parseD(dates[p.key]); if(!d){cells[p.key]={state:'empty'};return;} const gap=days(earliest,d); cells[p.key]={state:gap>win?'bad':'good',gap}; });
  const allReqDone = reqParts.length>0 && reqParts.every(p=>done.includes(p.key));
  let status = allReqDone?'done':(requiredMissing?'incomplete':(spread>win?'spread':'tight'));
  return {cat,parts,cells,spread,status,earliest,latest,win};
}

const board=$('board');
function matches(a,set){
  if(state.filter!=='all'&&a.status!==state.filter) return false;
  const q=state.search.trim().toLowerCase();
  if(q && !(set.pattern.toLowerCase().includes(q)||a.cat.name.toLowerCase().includes(q))) return false;
  return true;
}
function gridTpl(n){ return '11px 54px repeat('+n+', minmax(50px,1fr))'; }
function minW(n){ return (70+n*60)+'px'; }

function render(){
  const all=state.sets.map(s=>({s,a:analyze(s)}));
  const c={tight:0,spread:0,incomplete:0,done:0};
  all.forEach(x=>c[x.a.status]++);
  $('summary').innerHTML=`
    <button class="fbtn ${state.filter==='all'?'on':''}" data-filter="all"><b>${all.length}</b> sets</button><span class="sep">·</span>
    <button class="fbtn ${state.filter==='tight'?'on':''}" data-filter="tight"><span class="dot tight"></span><b>${c.tight}</b> tight</button>
    <button class="fbtn ${state.filter==='spread'?'on':''}" data-filter="spread"><span class="dot spread"></span><b>${c.spread}</b> spread</button>
    <button class="fbtn ${state.filter==='incomplete'?'on':''}" data-filter="incomplete"><span class="dot incomplete"></span><b>${c.incomplete}</b> incomplete</button>
    <button class="fbtn ${state.filter==='done'?'on':''}" data-filter="done"><span class="dot done"></span><b>${c.done}</b> done</button>`;

  const rows=all.filter(x=>matches(x.a,x.s));
  board.innerHTML='';
  if(rows.length===0){ renderEmpty(all.length===0); return; }

  if(state.view==='delays'){ renderDelays(rows); return; }

  if(state.view==='flat' || state.view==='priority'){
    const ch=document.createElement('div'); ch.className='col-head';
    ch.style.gridTemplateColumns=gridTpl(4); ch.style.minWidth=minW(4);
    ch.innerHTML=`<span></span><span>Pattern</span>`+ROLES.map(r=>`<span>${r.t}</span>`).join('');
    board.appendChild(ch);
    if(state.view==='priority'){
      const pri=rows.filter(x=>x.s.priority).sort(sortRows);
      const rest=rows.filter(x=>!x.s.priority).sort(sortRows);
      const section=(label,items,star)=>{
        if(!items.length) return;
        const t=document.createElement('div'); t.className='group-title';
        t.innerHTML=`<span class="nm"${star?' style="color:var(--pri)"':''}>${star?'★ ':''}${label}</span><span class="ct">${items.length}</span>`;
        board.appendChild(t);
        const sheet=document.createElement('div'); sheet.className='sheet';
        items.forEach(x=> sheet.appendChild(rowFlat(x.s,x.a)));
        board.appendChild(sheet);
      };
      section('Priority', pri, true);
      section('Others', rest, false);
    } else {
      const sheet=document.createElement('div'); sheet.className='sheet';
      rows.sort(sortRows).forEach(x=> sheet.appendChild(rowFlat(x.s,x.a)));
      board.appendChild(sheet);
    }
  } else {
    const groups={}; rows.forEach(x=>{ (groups[x.s.catId]=groups[x.s.catId]||[]).push(x); });
    Object.keys(groups).sort((a,b)=>getCat(a).name.localeCompare(getCat(b).name)).forEach(catId=>{
      const items=groups[catId]; items.sort(sortRows);
      const cat=getCat(catId); const n=cat.parts.length;
      const g=document.createElement('div'); g.className='group';
      g.innerHTML=`<div class="group-title"><span class="nm">${esc(cat.name)}</span><span class="ct">${items.length}</span></div>`;
      const ch=document.createElement('div'); ch.className='col-head';
      ch.style.gridTemplateColumns=gridTpl(n); ch.style.minWidth=minW(n);
      ch.innerHTML=`<span></span><span>Pattern</span>`+cat.parts.map(p=>`<span>${esc(p.label)}</span>`).join('');
      g.appendChild(ch);
      const sheet=document.createElement('div'); sheet.className='sheet';
      items.forEach(x=> sheet.appendChild(rowGrouped(x.s,x.a)));
      g.appendChild(sheet); board.appendChild(g);
    });
  }
}

function renderDelays(rows){
  const ch=document.createElement('div'); ch.className='col-head';
  ch.style.gridTemplateColumns='11px 54px 1fr 1fr 1fr 64px'; ch.style.minWidth='340px';
  ch.innerHTML=`<span></span><span>Pattern</span><span>Dispatch</span><span>Exp. ready</span><span>Actual</span><span>Delay</span>`;
  board.appendChild(ch);
  const withSc=rows.map(x=>({x, sc:schedule(x.s)}));
  // late first, then in-progress, then early/on-time, then no dispatch date
  const rank=o=>{ if(o.sc.delay!=null) return o.sc.delay>0?0:2; if(o.sc.disp&&!o.sc.allReq) return 1; return 3; };
  withSc.sort((a,b)=>{ const ra=rank(a),rb=rank(b); if(ra!==rb) return ra-rb; if(a.sc.delay!=null&&b.sc.delay!=null) return b.sc.delay-a.sc.delay; return a.x.s.pattern.localeCompare(b.x.s.pattern,undefined,{numeric:true}); });
  const sheet=document.createElement('div'); sheet.className='sheet';
  withSc.forEach(({x,sc})=>{
    const el=document.createElement('div'); el.className='row';
    el.style.gridTemplateColumns='11px 54px 1fr 1fr 1fr 64px'; el.style.minWidth='340px';
    let dl='<span class="dl n">—</span>';
    if(sc.delay!=null){ if(sc.delay>0) dl=`<span class="dl r">+${sc.delay}d</span>`; else if(sc.delay<0) dl=`<span class="dl g">${sc.delay}d</span>`; else dl='<span class="dl g">0d</span>'; }
    else if(sc.disp&&!sc.allReq) dl='<span class="dl w">wip</span>';
    el.innerHTML = stHtml(x.a)+pnHtml(x.s)
      +`<span class="d${sc.disp?'':' empty'}">${sc.disp?fmtShort(x.s.dispatch):'—'}</span>`
      +`<span class="d${sc.expectedReady?'':' empty'}">${sc.expectedReady?fmtShort(dateStr(sc.expectedReady)):'—'}</span>`
      +`<span class="d${sc.actualReady?(sc.delay>0?' late':''):' empty'}">${sc.actualReady?fmtShort(dateStr(sc.actualReady)):'—'}</span>`
      +dl;
    el.addEventListener('click',()=>openDetail(x.s.id));
    sheet.appendChild(el);
  });
  board.appendChild(sheet);
}
function sortRows(a,b){
  const pa=a.s.priority?0:1, pb=b.s.priority?0:1;
  if(pa!==pb) return pa-pb;
  const o={spread:0,incomplete:1,tight:2,done:3};
  if(o[a.a.status]!==o[b.a.status]) return o[a.a.status]-o[b.a.status];
  return a.s.pattern.localeCompare(b.s.pattern,undefined,{numeric:true});
}
function stHtml(a){ return a.status==='done'?`<span class="st done">✓</span>`:`<span class="st ${a.status}" title="${a.status}"></span>`; }

function dcell(set,a,part,sc){
  const key=part.key, c=a.cells[key], dateStr=(set.dates||{})[key];
  const done=(set.done||[]).includes(key);
  if(done) return `<span class="d dn"><span class="ck">✓</span></span>`;   // ticked → just ✓
  if(dateStr){
    const late=c&&c.state==='bad';
    const cls = late?'late':(set.priority?'pri':'');
    return `<span class="d ${cls}">${fmtShort(dateStr)}</span>`;
  }
  // empty → predicted start-by (if a dispatch date lets us compute it)
  const sb = sc && sc.partStartBy && sc.partStartBy[key];
  if(sb) return `<span class="d pred" title="start by">▸${fmtShort(dateStr2(sb))}</span>`;
  return `<span class="d empty">—</span>`;
}
function dateStr2(d){ return dateStr(d); }
function pnHtml(set){ return `<span class="pn${set.priority?' pri':''}">${set.priority?'<span class="pstar">★</span>':''}${esc(set.pattern)}</span>`; }
function rowGrouped(set,a){
  const el=document.createElement('div'); el.className='row'+(a.status==='done'?' is-done':'');
  el.style.gridTemplateColumns=gridTpl(a.parts.length); el.style.minWidth=minW(a.parts.length);
  const sc=schedule(set);
  el.innerHTML=stHtml(a)+pnHtml(set)+a.parts.map(p=>dcell(set,a,p,sc)).join('');
  el.addEventListener('click',()=>openDetail(set.id));
  return el;
}
function rowFlat(set,a){
  const el=document.createElement('div'); el.className='row'+(a.status==='done'?' is-done':'');
  el.style.gridTemplateColumns=gridTpl(4); el.style.minWidth=minW(4);
  const sc=schedule(set);
  let cells='';
  ROLE_ORDER.forEach(role=>{
    const ps=a.parts.filter(p=>p.role===role);
    if(ps.length===0){ cells+=`<span class="d empty">—</span>`; return; }
    const dated=ps.filter(p=>(set.dates||{})[p.key]||(set.done||[]).includes(p.key));
    const show=dated[0]||ps[0];
    let html=dcell(set,a,show,sc);
    const extraCount=dated.length>1?dated.length-1:0;
    if(extraCount>0) html=html.replace('</span>',` <span class="more">+${extraCount}</span></span>`);
    cells+=html;
  });
  el.innerHTML=stHtml(a)+pnHtml(set)+cells;
  el.addEventListener('click',()=>openDetail(set.id));
  return el;
}

/* ---------- detail ---------- */
function openDetail(id){
  editingId=id;
  const set=state.sets.find(s=>s.id===id); if(!set) return;
  const a=analyze(set);
  $('modalTitle').textContent='Set details'; showPane('detailBody');

  let badge;
  if(a.status==='done') badge=`<span class="badge k">Done ✓</span>`;
  else if(a.status==='incomplete') badge=`<span class="badge w">Incomplete</span>`;
  else if(a.status==='spread') badge=`<span class="badge r">Spread ${a.spread}d</span>`;
  else badge=`<span class="badge g">Tight ${a.spread}d</span>`;

  let meter='';
  const pts=a.parts.map(p=>({p,d:parseD((set.dates||{})[p.key])})).filter(o=>o.d);
  if(pts.length>=2){
    const span=Math.max(a.spread,a.win), zone=Math.min(100,(a.win/span)*100);
    let ticks=''; pts.forEach(o=>{ const gap=days(a.earliest,o.d); const x=span===0?0:(gap/span)*100; ticks+=`<span class="tick ${gap>a.win?'r':'g'}" style="left:${x}%"></span>`; });
    meter=`<div class="meter"><span class="zone" style="width:${zone}%"></span>${ticks}</div><div class="meter-cap">spread ${a.spread}d · window ${a.win}d</div>`;
  }

  const sc=schedule(set);
  let comps='';
  a.parts.forEach(p=>{
    const c=a.cells[p.key], long=fmtLong((set.dates||{})[p.key]);
    const done=(set.done||[]).includes(p.key);
    const sb=sc.partStartBy && sc.partStartBy[p.key];
    let valHtml, valCls;
    if(done){ valHtml='✓ done'; valCls='dn'; }
    else if(long){ valHtml=long; valCls=(c.state==='bad'?'late':''); }
    else if(sb){ valHtml='▸ start by '+fmtLong(dateStr(sb)); valCls='pred'; }
    else { valHtml='not set'; valCls='empty'; }
    const procs=partVarStages(set,p.key).map(v=>esc(v.name)).join(' + ');
    const leadTxt = partDays(p) ? `${partDays(p)}d make${procs?' + '+procs:''}` : (procs||'');
    comps+=`<div class="d-comp">
      <span class="lab">${esc(p.label)} ${p.optional?'<em>· extra</em>':''}${leadTxt?`<br><em class="pl-sub">${leadTxt}</em>`:''}</span>
      <span class="val ${valCls}">${valHtml}</span>
      <button class="ck-btn ${done?'on':''}" data-key="${p.key}" title="Mark done">✓</button>
    </div>`;
  });

  let sched='';
  {
    let delayChip='';
    if(sc.delay!=null){
      if(sc.delay>0) delayChip=`<span class="dl-chip r">${sc.delay}d late</span>`;
      else if(sc.delay<0) delayChip=`<span class="dl-chip g">${-sc.delay}d early</span>`;
      else delayChip=`<span class="dl-chip g">on time</span>`;
    } else if(sc.disp && !sc.allReq){ delayChip=`<span class="dl-chip w">in progress</span>`; }
    const fixBits=(state.stages||[]).map(st=>esc(st.name)+' '+(parseInt(st.days,10)||0)+'d');
    sched=`<div class="sched">
      <div class="sched-h">Schedule ${delayChip}</div>
      <div class="sched-grid">
        <div class="sk">Start by (whole design)</div><div class="sv${sc.startBy?' hl':''}">${sc.startBy?fmtLong(dateStr(sc.startBy)):'—'}</div>
        <div class="sk">Ready by (expected)</div><div class="sv">${sc.expectedReady?fmtLong(dateStr(sc.expectedReady)):'—'}</div>
        <div class="sk">Actual ready</div><div class="sv${sc.delay>0?' late':''}">${sc.actualReady?fmtLong(dateStr(sc.actualReady)):(sc.allReq?'—':'not complete')}</div>
        <div class="sk">Dispatch by</div><div class="sv">${sc.disp?fmtLong(set.dispatch):'<span class="sfaint">set a date in Edit</span>'}</div>
      </div>
      <div class="sched-foot">Longest piece path ${sc.maxLead}d (make + its processes) · Fixed ${fixBits.length?fixBits.join(', '):'none'} · Buffer ${sc.buffer}d<br><b>${sc.lead+sc.buffer}d</b> total start→dispatch</div>
    </div>`;
  }

  $('detailBody').innerHTML=`
    <div class="d-top"><span class="d-pn${set.priority?' pri':''}">${esc(set.pattern)}</span><span class="d-cat">${esc(a.cat.name)}</span><button class="pri-toggle ${set.priority?'on':''}" id="dPriority" title="Mark priority">★</button>${badge}</div>
    ${meter}
    <div>${comps}</div>
    ${sched}
    ${set.note?`<div class="d-note"><div class="nl">Note</div>${esc(set.note)}</div>`:''}
    <div class="mfoot"><button class="btn danger" id="dDelete">Delete</button><button class="btn primary" id="dEdit">Edit</button></div>`;

  $('detailBody').querySelectorAll('.ck-btn').forEach(b=>b.addEventListener('click',()=>toggleDone(id,b.dataset.key)));
  $('dPriority').addEventListener('click',()=>togglePriority(id));
  $('dEdit').addEventListener('click',()=>openEdit(id));
  $('dDelete').addEventListener('click',deleteSet);
  showModal();
}
function toggleDone(id,key){
  const set=state.sets.find(s=>s.id===id); if(!set) return;
  set.done=set.done||[];
  const i=set.done.indexOf(key);
  if(i>=0) set.done.splice(i,1); else set.done.push(key);
  save(); cloudWriteSet(set); openDetail(id); render();
}
function togglePriority(id){
  const set=state.sets.find(s=>s.id===id); if(!set) return;
  set.priority=!set.priority;
  save(); cloudWriteSet(set); openDetail(id); render();
}

function saveSet(){
  const pattern=$('fPattern').value.trim();
  if(!pattern){ toast('Pattern no. is required'); $('fPattern').focus(); return; }
  const catId=$('fCat').value; const cat=getCat(catId);

  const data={pattern,catId,dates,done,partVars,note:$('fNote').value.trim(),priority:$('fPriority').classList.contains('on'),dispatch:$('fDispatch').value||''};

function setSync(s){
  const chip=$('syncChip'), lab=$('syncLab');
  chip.className='sync '+(s==='synced'?'synced':s==='offline'?'offline':s==='error'?'error':s==='connecting'?'connecting':'local');
  lab.textContent = s==='synced'?'Synced':s==='offline'?'Offline':s==='error'?'Sync error':s==='connecting'?'Connecting…':'Local';
}
function cloudWriteSet(set){ if(!cloud.on)return; try{ const {doc,setDoc}=cloud.fns; setDoc(doc(cloud.db,'sets',set.id), {pattern:set.pattern,catId:set.catId,dates:set.dates||{},done:set.done||[],note:set.note||'',priority:!!set.priority,dispatch:set.dispatch||'',partVars:set.partVars||{}}).catch(()=>setSync('error')); }catch(e){} }
function cloudDeleteSet(id){ if(!cloud.on)return; try{ const {doc,deleteDoc}=cloud.fns; deleteDoc(doc(cloud.db,'sets',id)).catch(()=>setSync('error')); }catch(e){} }
function cloudDeleteMany(ids){ (ids||[]).forEach(cloudDeleteSet); }
function cloudWriteMeta(){ if(!cloud.on)return; try{ const {doc,setDoc}=cloud.fns; setDoc(doc(cloud.db,'meta','config'), {categories:state.categories, stages:state.stages, variableStages:state.variableStages, buffer:state.buffer, window:state.window}).catch(()=>setSync('error')); }catch(e){} }
function cloudReplaceAll(){ if(!cloud.on)return; (cloud.knownIds||[]).slice().forEach(cloudDeleteSet); state.sets.forEach(cloudWriteSet); cloudWriteMeta(); }

async function initCloud(){
  if(!FIREBASE_CONFIG.projectId){ setSync('local'); return; }
  setSync('connecting');
  try{
    const V='https://www.gstatic.com/firebasejs/12.15.0/';
    const { initializeApp } = await import(V+'firebase-app.js');
    const fs = await import(V+'firebase-firestore.js');
    const app = initializeApp(FIREBASE_CONFIG);
    let db;
    try{ db = fs.initializeFirestore(app, { localCache: fs.persistentLocalCache({ tabManager: fs.persistentMultipleTabManager() }), ignoreUndefinedProperties:true }); }
    catch(e){ db = fs.getFirestore(app); }
    cloud.on=true; cloud.db=db; cloud.fns=fs;
    subscribeCloud();
  }catch(e){ console.warn('Cloud sync unavailable:', e); setSync('error'); }
}
function subscribeCloud(){
  const { collection, onSnapshot, doc } = cloud.fns;
  onSnapshot(collection(cloud.db,'sets'), snap=>{
    if(!cloud.seeded){
      cloud.seeded=true;
      if(snap.empty && state.sets.length){ // first device: push existing local data up
        const localSets=state.sets.slice(); localSets.forEach(cloudWriteSet); cloudWriteMeta();
        cloud.knownIds=localSets.map(s=>s.id); setSync('synced'); return;
      }
    }
    state.sets = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    cloud.knownIds = state.sets.map(s=>s.id);
    setSync(snap.metadata.fromCache?'offline':'synced');
    render();
  }, err=>{ console.warn(err); setSync('error'); });
  onSnapshot(doc(cloud.db,'meta','config'), snap=>{
    if(snap.exists()){ const d=snap.data(); if(Array.isArray(d.categories)&&d.categories.length) state.categories=d.categories; if(Array.isArray(d.stages)) state.stages=d.stages; if(Array.isArray(d.variableStages)) state.variableStages=d.variableStages; if(d.buffer!=null) state.buffer=d.buffer; if(d.window){ state.window=d.window; $('windowInput').value=d.window; } render(); }
  }, ()=>{});
}
$('syncChip').addEventListener('click',()=>{
  if(!FIREBASE_CONFIG.projectId) toast('Local mode — add a Firebase config in the file to sync across devices');
  else if(cloud.on) toast(cloud.knownIds.length+' sets synced to the cloud');
  else toast('Could not reach the cloud — check the Firebase config');
});

load();
$('windowInput').value=state.window;
[...document.querySelectorAll('#viewSeg button')].forEach(b=>b.classList.toggle('on',b.dataset.view===state.view));
render();
initCloud();
if(!Store.persistent && !FIREBASE_CONFIG.projectId) setTimeout(()=>toast("Preview mode — data won't persist on reload. Deploy the file to keep data."),700);
</script>
</body>
</html>
